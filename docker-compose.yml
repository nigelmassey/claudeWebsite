services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Gallery__Password=${GALLERY_PASSWORD}
      - Gallery__StoragePath=/app/PhotoStorage
    volumes:
      - photo_storage:/app/PhotoStorage
    networks:
      - internal
    # No 'ports:' mapping — app is not reachable from outside Docker

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/claudewebsite.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Not started automatically — run manually (see deployment notes)

volumes:
  photo_storage:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
