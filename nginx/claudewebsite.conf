# Initial HTTP-only config — used to obtain the Let's Encrypt certificate.
# After running certbot, replace this file with the full HTTPS config below
# and reload nginx: docker compose exec nginx nginx -s reload

server {
    listen 80;
    server_name nigelmassey.org www.nigelmassey.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

